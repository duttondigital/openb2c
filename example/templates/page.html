{% extends "base.html" %}

{% block content %}
{% if page.extra.hero %}
<section class="page-header">
    <div class="container">
        <h1>{{ page.extra.hero }}</h1>
        {% if page.extra.subtitle %}
        <p>{{ page.extra.subtitle }}</p>
        {% endif %}
    </div>
</section>
{% endif %}

<section>
    <div class="container">
        {{ page.content | safe }}
    </div>
</section>
{% endblock %}
