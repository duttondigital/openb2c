<ul class="social-links" aria-label="Social media links">
    {% if config.extra.social.facebook %}
    <li><a href="{{ config.extra.social.facebook }}" rel="noopener noreferrer" target="_blank">Facebook</a></li>
    {% endif %}
    {% if config.extra.social.instagram %}
    <li><a href="{{ config.extra.social.instagram }}" rel="noopener noreferrer" target="_blank">Instagram</a></li>
    {% endif %}
</ul>
