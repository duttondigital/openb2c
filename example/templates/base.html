<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title and page.title != config.title %}{{ page.title }} - {{ config.title }}{% elif section.title and section.title != config.title %}{{ section.title }} - {{ config.title }}{% else %}{{ config.title }}{% endif %}</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
      <div class="container">
        <div class="header-content">
          <a href="/" class="logo">
            <img src="{{ config.extra.logo }}" alt="{{ config.extra.logo_alt }}">
          </a>
          <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-hidden="true">
          <label for="menu-toggle" class="menu-toggle-label" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </label>
          <nav aria-label="Main navigation">
            <ul>
              {% for item in config.extra.nav %}
              <li>
                <a href="{{ item.url }}"
                  {% if current_path == item.url or (item.url != "/" and current_path is starting_with(item.url)) %}
                    class="active" aria-current="page"
                  {% endif %}
                >{{ item.label }}</a>
              </li>
              {% endfor %}
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
      <div class="container">
        <p>&copy; {{ config.extra.copyright_year }} {{ config.extra.legal_name }}. All rights reserved.</p>
        {% for line in config.extra.legal_lines %}
        <p>{{ line }}</p>
        {% endfor %}
      </div>
    </footer>
</body>
</html>
