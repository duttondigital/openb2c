<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <mask id="note-cutout">
      <rect width="100" height="100" fill="white"/>
      <!-- Notehead: tilted ellipse, centered -->
      <ellipse cx="50" cy="50" rx="13" ry="9" transform="rotate(-20 50 50)" fill="black"/>
      <!-- Stem: from center to top -->
      <rect x="59" y="2" width="3.5" height="48" rx="1.75" fill="black"/>
    </mask>
  </defs>
  <circle cx="50" cy="50" r="46" fill="black" mask="url(#note-cutout)"/>
</svg>
