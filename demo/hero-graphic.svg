<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" fill="none">
  <defs>
    <radialGradient id="glow" cx="70%" cy="35%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="fade">
      <rect width="360" height="360" fill="url(#glow)"/>
    </mask>
  </defs>
  <g mask="url(#fade)">
    <!-- Row 0 -->
    <rect x="60" y="0" width="52" height="52" rx="8" fill="white" opacity="0.06"/>
    <rect x="120" y="0" width="52" height="52" rx="8" fill="white" opacity="0.10"/>
    <rect x="180" y="0" width="52" height="52" rx="8" fill="white" opacity="0.06"/>
    <!-- Row 1 -->
    <rect x="0" y="60" width="52" height="52" rx="8" fill="white" opacity="0.05"/>
    <rect x="60" y="60" width="52" height="52" rx="8" fill="white" opacity="0.12"/>
    <rect x="120" y="60" width="52" height="52" rx="8" fill="white" opacity="0.08"/>
    <rect x="180" y="60" width="52" height="52" rx="8" fill="white" opacity="0.15"/>
    <rect x="240" y="60" width="52" height="52" rx="8" fill="white" opacity="0.07"/>
    <!-- Row 2 -->
    <rect x="60" y="120" width="52" height="52" rx="8" fill="white" opacity="0.07"/>
    <rect x="120" y="120" width="52" height="52" rx="8" fill="white" opacity="0.15"/>
    <rect x="180" y="120" width="52" height="52" rx="8" fill="white" opacity="0.12"/>
    <rect x="240" y="120" width="52" height="52" rx="8" fill="white" opacity="0.08"/>
    <!-- Row 3 -->
    <rect x="120" y="180" width="52" height="52" rx="8" fill="white" opacity="0.10"/>
    <rect x="180" y="180" width="52" height="52" rx="8" fill="white" opacity="0.15"/>
    <rect x="240" y="180" width="52" height="52" rx="8" fill="white" opacity="0.12"/>
    <rect x="300" y="180" width="52" height="52" rx="8" fill="white" opacity="0.06"/>
    <!-- Row 4 -->
    <rect x="180" y="240" width="52" height="52" rx="8" fill="white" opacity="0.08"/>
    <rect x="240" y="240" width="52" height="52" rx="8" fill="white" opacity="0.13"/>
    <rect x="300" y="240" width="52" height="52" rx="8" fill="white" opacity="0.07"/>
    <!-- Row 5 -->
    <rect x="240" y="300" width="52" height="52" rx="8" fill="white" opacity="0.06"/>
    <rect x="300" y="300" width="52" height="52" rx="8" fill="white" opacity="0.10"/>
    <!-- Floating detached module -->
    <rect x="304" y="4" width="44" height="44" rx="8" stroke="white" stroke-width="1.5" fill="none" opacity="0.15"/>
    <!-- Dashed connection -->
    <line x1="232" y1="26" x2="304" y2="26" stroke="white" stroke-width="1" stroke-dasharray="4 3" opacity="0.10"/>
  </g>
</svg>
