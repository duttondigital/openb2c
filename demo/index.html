<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenB2C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pathway+Extreme:wght@300;400;500;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0b0b;
      --fg: #e8e8e8;
      --accent: #fff;
      --accent-dim: rgba(255, 255, 255, 0.06);
      --muted: #777;
      --surface: #1c1c1c;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Panels */
    .panel {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }

    .panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Logo */
    .corner-logo {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 101;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      text-decoration: none;
    }

    .corner-logo svg { height: 1.6em; width: auto; display: block; }

    .corner-logo .logo-text {
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      font-weight: 300;
      font-family: 'Pathway Extreme', sans-serif;
      text-transform: uppercase;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
    }

    .corner-logo .logo-stretch { display: block; letter-spacing: 0.12em; }

    /* ---- Step 0: Analysis ---- */
    .analyse-input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .analyse-input-wrap.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      position: absolute;
    }

    .analyse-input {
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 0.75rem;
      padding: 1rem 1.5rem;
      color: var(--fg);
      font-size: 1.25rem;
      width: 400px;
      text-align: center;
      transition: border-color 0.2s;
      font-family: monospace;
      outline: none;
    }

    .analyse-input:focus { border-color: #fff; }
    .analyse-input::placeholder { color: var(--muted); }
    .analyse-hint { font-size: 0.8rem; color: var(--muted); }

    .case-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      position: absolute;
      pointer-events: none;
    }

    .case-layout.active {
      opacity: 1;
      transform: translateY(0);
      position: relative;
      pointer-events: auto;
    }

    .mod-graph {
      position: relative;
      border: 1px solid transparent;
      border-radius: 0.75rem;
      padding: 1.25rem 1.25rem 1rem;
      transition: border-color 0.5s ease;
    }

    .mod-graph-summary {
      text-align: center;
      margin-bottom: 1rem;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .mod-graph-summary.visible { opacity: 1; }
    .mod-graph-summary .summary-title { font-size: 0.95rem; color: var(--fg); margin-bottom: 0.25rem; }
    .mod-graph-summary .summary-traits { font-size: 0.8rem; color: var(--muted); }
    .mod-graph.outlined { border-color: rgba(255, 255, 255, 0.2); }

    .mod-graph-label {
      position: absolute;
      top: -0.65em;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      padding: 0 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .mod-graph.outlined .mod-graph-label { opacity: 1; }

    .mod-svg { display: block; width: 310px; height: 110px; }
    .mod-node-rect { fill: var(--surface); opacity: 0; transition: opacity 0.35s ease; }
    .mod-node-rect.visible { opacity: 1; }
    .mod-node-text { fill: var(--muted); font-family: monospace; font-size: 11px; text-anchor: middle; dominant-baseline: middle; opacity: 0; transition: opacity 0.35s ease; }
    .mod-node-text.visible { opacity: 1; }
    .mod-link { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; fill: none; stroke-dasharray: 40; stroke-dashoffset: 40; transition: stroke-dashoffset 0.5s ease; }
    .mod-link.drawn { stroke-dashoffset: 0; }

    .arch-connector { width: 1px; height: 28px; position: relative; overflow: hidden; opacity: 0; transition: opacity 0.3s ease; }
    .arch-connector.visible { opacity: 1; }
    .arch-connector::before {
      content: '';
      position: absolute;
      top: -6px; left: 0;
      width: 1px;
      height: calc(100% + 12px);
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.5) 0 2px, transparent 2px 6px);
      animation: connFlow 0.4s linear infinite;
    }

    @keyframes connFlow { from { transform: translateY(0); } to { transform: translateY(6px); } }

    .arch-api { background: var(--fg); color: var(--bg); padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.85rem; opacity: 0; transform: scale(0.9); transition: opacity 0.4s ease, transform 0.4s ease; }
    .arch-api.visible { opacity: 1; transform: scale(1); }
    .arch-fan { width: 240px; height: 28px; opacity: 0; transition: opacity 0.4s ease; }
    .arch-fan.visible { opacity: 1; }
    .arch-fan-line { stroke: rgba(255,255,255,0.4); stroke-width: 1; stroke-dasharray: 3 4; animation: fanFlow 0.5s linear infinite; }
    @keyframes fanFlow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -7; } }
    .arch-clients { display: flex; justify-content: space-around; width: 240px; }
    .arch-client { background: var(--surface); padding: 0.4rem 0.75rem; border-radius: 0.4rem; color: var(--muted); font-size: 0.75rem; text-align: center; opacity: 0; transform: translateY(5px); transition: opacity 0.3s ease, transform 0.3s ease; }
    .arch-client.visible { opacity: 1; transform: translateY(0); }

    .get-started-btn {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      background: var(--fg);
      color: var(--bg);
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .get-started-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .get-started-btn:hover { opacity: 0.9; }

    /* ---- Step 1: Dashboard (split screen) ---- */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      width: 100%;
      max-width: 1200px;
      height: calc(100vh - 6rem);
      padding-top: 1rem;
    }

    .dashboard-left,
    .dashboard-right {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Feed (left side) */
    .feed-wrap {
      flex: 1;
      border: 1px solid var(--surface);
      border-radius: 1rem;
      padding: 1.25rem;
      padding-top: 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    .feed-header {
      position: absolute;
      top: -0.6em;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      padding: 0 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .live-dot {
      position: relative;
      width: 8px;
      height: 8px;
    }

    .live-dot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--fg);
      border-radius: 50%;
    }

    .live-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--fg);
      animation: livePing 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes livePing {
      0% { transform: scale(1); opacity: 0.6; }
      75%, 100% { transform: scale(2); opacity: 0; }
    }

    .feed-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .booking-entry {
      background: var(--surface);
      border-radius: 0.5rem;
      padding: 0.6rem 0.75rem;
      animation: bookingIn 0.4s ease;
    }

    @keyframes bookingIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .booking-entry .be-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.15rem; }
    .booking-entry .be-amount { font-weight: 600; font-size: 0.85rem; }
    .booking-entry .be-time { font-size: 0.65rem; color: var(--muted); }
    .booking-entry .be-email { font-size: 0.75rem; color: var(--muted); }
    .booking-entry .be-client { display: inline-block; margin-top: 0.35rem; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.1rem 0.35rem; border-radius: 0.2rem; border: 1px solid var(--muted); color: var(--muted); }
    .booking-entry .be-client.mcp { border-color: var(--fg); color: var(--fg); }
    .booking-entry .be-client.unknown { border-color: var(--fg); color: var(--fg); }
    .feed-empty { color: var(--muted); text-align: center; padding: 2rem; font-style: italic; font-size: 0.85rem; }

    /* Booking UI (right side) */
    .booking-wrap {
      flex: 1;
      border: 1px solid var(--surface);
      border-radius: 1rem;
      padding: 1.25rem;
      padding-top: 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: visible;
      position: relative;
    }

    .booking-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
    }

    .booking-title {
      position: absolute;
      top: -0.6em;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      padding: 0 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    /* Show list view */
    .show-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .show-card {
      background: var(--surface);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: filter 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .show-card:hover { filter: brightness(1.3); }

    .show-card-info h5 { font-size: 0.9rem; margin-bottom: 0.15rem; }
    .show-card-info .meta { font-size: 0.7rem; color: var(--muted); }
    .show-card-price { font-size: 0.85rem; font-weight: 600; color: var(--fg); white-space: nowrap; }
    .show-card-arrow { color: var(--muted); font-size: 1rem; margin-left: 0.75rem; }

    /* Show detail view */
    .show-detail { display: none; flex-direction: column; gap: 0.75rem; }
    .show-detail.active { display: flex; }

    .back-link {
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
      align-self: flex-start;
    }

    .back-link:hover { color: var(--fg); }

    .show-detail-header h4 { font-size: 1rem; margin-bottom: 0.1rem; }
    .show-detail-header .meta { font-size: 0.75rem; color: var(--muted); }

    .booking-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Seat tier legend */
    .seat-legend {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .seat-legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.6rem; color: var(--muted); }
    .seat-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
    .seat-legend-swatch.tier-premium { background: #4a3f2a; }
    .seat-legend-swatch.tier-standard { background: var(--surface); }
    .seat-legend-swatch.tier-rear { background: #1a1a2a; }

    .seat-map-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }

    .seat-map-stage {
      background: var(--surface);
      color: var(--muted);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 0.2rem 1.5rem;
      border-radius: 0 0 0.4rem 0.4rem;
      text-align: center;
      width: 320px;
    }

    .seat-map {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      width: 100%;
      max-width: 320px;
    }

    .seat {
      aspect-ratio: 1;
      background: var(--surface);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.45rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.15s;
      user-select: none;
    }

    .seat:hover { filter: brightness(1.5); }

    .seat.tier-premium { background: #4a3f2a; }
    .seat.tier-standard { background: var(--surface); }
    .seat.tier-rear { background: #1a1a2a; }

    .seat.selected { background: #fff; color: #0b0b0b; filter: none; font-weight: 600; }
    .seat.taken { cursor: default; pointer-events: none; filter: none; opacity: 25% }

    .seat-info { font-size: 0.7rem; color: var(--muted); text-align: center; }
    .seat-info strong { color: var(--fg); }

    /* Summary + checkout */
    .booking-summary {
      background: var(--surface);
      border-radius: 0.5rem;
      padding: 0.75rem;
    }

    .summary-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; }
    .summary-row.total { color: var(--fg); font-weight: 600; font-size: 0.9rem; border-top: 1px solid #333; padding-top: 0.4rem; margin-top: 0.4rem; margin-bottom: 0; }

    .booking-email {
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      color: var(--fg);
      font-size: 0.8rem;
      transition: border-color 0.2s;
      width: 100%;
      outline: none;
    }

    .booking-email:focus { border-color: #fff; }
    .booking-email::placeholder { color: var(--muted); }

    .book-btn {
      width: 100%;
      padding: 0.6rem;
      background: var(--fg);
      color: var(--bg);
      border: none;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .book-btn:disabled { opacity: 0.3; cursor: default; }
    .book-btn:not(:disabled):hover { opacity: 0.9; }

    .booking-success {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--fg);
      border-radius: 0.5rem;
      padding: 0.6rem;
      color: var(--fg);
      text-align: center;
      font-size: 0.8rem;
      animation: bookingIn 0.3s ease;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .panel { padding: 2rem; }
      .dashboard-layout { grid-template-columns: 1fr; }
      .analyse-input { width: 100%; max-width: 300px; }
    }
  </style>
</head>
<body>
  <a class="corner-logo" href="https://dutton.digital">
    <svg viewBox="-1 -1 23 23" fill="none" aria-hidden="true">
      <path d="M 1,0 L 8,0 C 15,0 15,14 8,14 L 1,14 A 1,1 0 0,1 0,13 L 0,1 A 1,1 0 0,1 1,0 Z" stroke="white" stroke-width="1.2" fill="none"/>
      <path d="M 7,7 L 14,7 C 21,7 21,21 14,21 L 7,21 A 1,1 0 0,1 6,20 L 6,8 A 1,1 0 0,1 7,7 Z" stroke="white" stroke-width="1.2" fill="none"/>
    </svg>
    <div class="logo-text"><span>Dutton</span><span class="logo-stretch">Digital</span></div>
  </a>

  <!-- Step 0: Analysis -->
  <section class="panel" data-panel="0">
    <div class="analyse-input-wrap" id="analyse-input-wrap">
      <input type="text" class="analyse-input" id="analyse-input" placeholder="duchyopera.co.uk" autocomplete="off" spellcheck="false" />
      <div class="analyse-hint">Enter a website to analyse</div>
    </div>

    <div class="case-layout" id="case-results">
      <div class="mod-graph" id="mod-graph">
        <div class="mod-graph-label">Duchy Opera</div>
        <div class="mod-graph-summary" id="mod-summary">
          <div class="summary-title">Cornish charity opera company</div>
          <div class="summary-traits">Seasonal tourism · Ageing audience · Charity budget</div>
        </div>
        <svg class="mod-svg" viewBox="0 0 310 110">
          <line class="mod-link" x1="90" y1="25" x2="113" y2="25"/>
          <line class="mod-link" x1="197" y1="25" x2="220" y2="25"/>
          <line class="mod-link" x1="155" y1="41" x2="155" y2="69"/>
          <line class="mod-link" x1="90" y1="85" x2="113" y2="85"/>
          <line class="mod-link" x1="197" y1="85" x2="220" y2="85"/>
          <rect class="mod-node-rect" x="6" y="9" width="84" height="32" rx="5"/>
          <text class="mod-node-text" x="48" y="26">venue</text>
          <rect class="mod-node-rect" x="113" y="9" width="84" height="32" rx="5"/>
          <text class="mod-node-text" x="155" y="26">performance</text>
          <rect class="mod-node-rect" x="220" y="9" width="84" height="32" rx="5"/>
          <text class="mod-node-text" x="262" y="26">artist</text>
          <rect class="mod-node-rect" x="6" y="69" width="84" height="32" rx="5"/>
          <text class="mod-node-text" x="48" y="86">customer</text>
          <rect class="mod-node-rect" x="113" y="69" width="84" height="32" rx="5"/>
          <text class="mod-node-text" x="155" y="86">ticket</text>
          <rect class="mod-node-rect" x="220" y="69" width="84" height="32" rx="5"/>
          <text class="mod-node-text" x="262" y="86">transaction</text>
        </svg>
      </div>
      <div class="arch-connector" id="arch-conn-1"></div>
      <div class="arch-api" id="arch-api">REST + MCP</div>
      <svg class="arch-fan" id="arch-fan" viewBox="0 0 240 28" fill="none">
        <line class="arch-fan-line" x1="120" y1="0" x2="40" y2="28"/>
        <line class="arch-fan-line" x1="120" y1="0" x2="120" y2="28"/>
        <line class="arch-fan-line" x1="120" y1="0" x2="200" y2="28"/>
      </svg>
      <div class="arch-clients">
        <div class="arch-client" id="client-web">Web UI</div>
        <div class="arch-client" id="client-ai">AI Agent</div>
        <div class="arch-client" id="client-future">???</div>
      </div>
    </div>
    <button class="get-started-btn" id="get-started-btn">Get Started</button>
  </section>

  <!-- Step 1: Dashboard (feed + booking side by side) -->
  <section class="panel" data-panel="1">
    <div class="dashboard-layout">
      <!-- Left: live feed -->
      <div class="dashboard-left">
        <div class="feed-wrap">
          <div class="feed-header"><span class="live-dot"></span>Live Bookings</div>
          <div class="feed-list" id="feed-list"></div>
        </div>
      </div>

      <!-- Right: booking UI -->
      <div class="dashboard-right">
        <div class="booking-wrap">
          <div class="booking-title">Web UI</div>
          <div class="booking-inner">

          <!-- Show list (loaded from API) -->
          <div class="show-list" id="show-list"></div>

          <!-- Show detail (seat selection + checkout) -->
          <div class="show-detail" id="show-detail">
            <div class="back-link" id="back-link">← All shows</div>
            <div class="show-detail-header" id="show-detail-header">
              <h4></h4>
              <div class="meta"></div>
            </div>

            <div class="seat-legend">
              <span class="seat-legend-item"><span class="seat-legend-swatch tier-premium"></span>Premium</span>
              <span class="seat-legend-item"><span class="seat-legend-swatch tier-standard"></span>Standard</span>
              <span class="seat-legend-item"><span class="seat-legend-swatch tier-rear"></span>Rear</span>
            </div>
            <div class="seat-map-wrap">
              <div class="seat-map-stage">Stage</div>
              <div class="seat-map" id="seat-map"></div>
              <div class="seat-info" id="seat-info">Click seats to select</div>
            </div>

            <div class="booking-summary">
              <div class="summary-row"><span>Seats</span><span id="sum-seats">—</span></div>
              <div id="sum-breakdown"></div>
              <div class="summary-row total"><span>Total</span><span id="sum-total">£0.00</span></div>
            </div>

            <input type="email" class="booking-email" id="booking-email" placeholder="Email address" />
            <button class="book-btn" id="book-btn" disabled>Select seats</button>
            <div id="booking-success" class="booking-success" style="display: none;"></div>
          </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const API = 'http://localhost:3085/api';
    let currentStep = 0;
    const panels = document.querySelectorAll('.panel');
    const stepEls = document.querySelectorAll('.steps .step');
    const lineEl = document.getElementById('line-0');  // may not exist

    let analysisPhase = 'input';

    // --- Step navigation ---
    function showStep(index) {
      if (index < 0 || index > 1) return;
      currentStep = index;

      panels.forEach((p, i) => p.classList.toggle('visible', i === index));
      stepEls.forEach((s, i) => {
        s.classList.remove('active', 'completed');
        if (i < index) s.classList.add('completed');
        else if (i === index) s.classList.add('active');
      });
      if (lineEl) lineEl.classList.toggle('completed', index > 0);

      if (index === 1) { loadPerformances(); startPolling(); }
      else stopPolling();
    }

    function nextStep() { showStep(currentStep + 1); }

    // --- Keyboard ---
    document.addEventListener('keydown', (e) => {
      const tag = document.activeElement?.tagName;
      const isInput = tag === 'INPUT' || tag === 'BUTTON';

      if (isInput && document.activeElement.id === 'analyse-input') {
        if (e.key === 'Enter') { e.preventDefault(); startAnalysis(document.activeElement.value.trim()); }
        return;
      }

      // Space on dashboard injects brain booking
      if (e.key === ' ' && currentStep === 1 && !isInput) {
        e.preventDefault();
        injectBrainBooking();
      }
    });

    // --- Step 0: Analysis animation ---
    function startAnalysis(url) {
      if (!url) return;
      analysisPhase = 'analysing';

      document.getElementById('analyse-input-wrap').classList.add('hidden');
      document.getElementById('case-results').classList.add('active');

      const rects = document.querySelectorAll('.mod-node-rect');
      const texts = document.querySelectorAll('.mod-node-text');
      const nodeDelay = 250;

      rects.forEach((rect, i) => {
        setTimeout(() => { rect.classList.add('visible'); texts[i].classList.add('visible'); }, i * nodeDelay);
      });

      const afterNodes = rects.length * nodeDelay + 150;
      const links = document.querySelectorAll('.mod-link');
      links.forEach((link, i) => {
        setTimeout(() => link.classList.add('drawn'), afterNodes + i * 120);
      });

      const afterLinks = afterNodes + links.length * 120 + 200;
      setTimeout(() => {
        document.getElementById('mod-graph').classList.add('outlined');
        document.getElementById('mod-summary').classList.add('visible');
      }, afterLinks);

      setTimeout(() => document.getElementById('arch-conn-1').classList.add('visible'), afterLinks + 500);
      setTimeout(() => document.getElementById('arch-api').classList.add('visible'), afterLinks + 700);
      setTimeout(() => document.getElementById('arch-fan').classList.add('visible'), afterLinks + 1000);

      const clients = document.querySelectorAll('.arch-client');
      clients.forEach((c, i) => {
        setTimeout(() => c.classList.add('visible'), afterLinks + 1200 + i * 150);
      });

      const afterClients = afterLinks + 1200 + clients.length * 150 + 300;
      setTimeout(() => {
        analysisPhase = 'done';
        document.getElementById('get-started-btn').classList.add('visible');
      }, afterClients);
    }

    document.getElementById('get-started-btn').addEventListener('click', nextStep);

    // --- Step 1: Booking UI ---
    const ROWS = 'ABCDEF';
    const COLS = 10;
    let selectedPerf = null;
    let selectedSeats = new Set();

    // Base price in pence — tier multipliers applied on top
    const BASE_PRICE_PENCE = 2500;

    const TIER_MAP = {
      A: { type: 'premium', mult: 1.5, label: 'Premium' },
      B: { type: 'premium', mult: 1.5, label: 'Premium' },
      C: { type: 'standard', mult: 1, label: 'Standard' },
      D: { type: 'standard', mult: 1, label: 'Standard' },
      E: { type: 'rear', mult: 0.7, label: 'Rear' },
      F: { type: 'rear', mult: 0.7, label: 'Rear' },
    };

    function getTier(seatLabel) { return TIER_MAP[seatLabel[0]]; }

    // Build seat map
    const seatMap = document.getElementById('seat-map');
    for (let r = 0; r < ROWS.length; r++) {
      for (let c = 1; c <= COLS; c++) {
        const label = ROWS[r] + c;
        const tier = TIER_MAP[ROWS[r]];
        const seat = document.createElement('div');
        seat.className = 'seat tier-' + tier.type;
        seat.textContent = label;
        seat.dataset.label = label;
        seat.addEventListener('click', () => toggleSeat(seat, label));
        seatMap.appendChild(seat);
      }
    }

    function toggleSeat(el, label) {
      if (el.classList.contains('taken')) return;
      if (selectedSeats.has(label)) { selectedSeats.delete(label); el.classList.remove('selected'); }
      else { selectedSeats.add(label); el.classList.add('selected'); }
      updateSummary();
    }

    // Show list → detail navigation
    const showList = document.getElementById('show-list');
    const showDetail = document.getElementById('show-detail');

    // Venue cache
    const venueCache = {};
    async function getVenue(id) {
      if (venueCache[id]) return venueCache[id];
      const res = await fetch(`${API}/venues/${id}`);
      const v = await res.json();
      venueCache[id] = v;
      return v;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    async function loadPerformances() {
      showList.innerHTML = '<div class="feed-empty">Loading performances...</div>';
      try {
        const res = await fetch(`${API}/performances?status=scheduled`);
        const data = await res.json();
        if (!data.items || data.items.length === 0) {
          showList.innerHTML = '<div class="feed-empty">No performances scheduled</div>';
          return;
        }
        showList.innerHTML = '';
        for (const perf of data.items) {
          const venue = await getVenue(perf.venue_id);
          const meta = `${formatDate(perf.date)} · ${venue.name}`;
          const card = document.createElement('div');
          card.className = 'show-card';
          card.dataset.id = perf.id;
          card.dataset.name = perf.title;
          card.dataset.meta = meta;
          card.innerHTML = `
            <div class="show-card-info">
              <h5>${perf.title}</h5>
              <div class="meta">${meta}</div>
            </div>
            <div class="show-card-arrow">›</div>
          `;
          card.addEventListener('click', () => openPerformance(perf, meta));
          showList.appendChild(card);
        }
      } catch (err) {
        console.error('Failed to load performances:', err);
        showList.innerHTML = '<div class="feed-empty">Failed to load — is the API running?</div>';
      }
    }

    async function loadTakenSeats(performanceId) {
      try {
        seatMap.querySelectorAll('.seat.taken').forEach(s => s.classList.remove('taken'));
        const res = await fetch(`${API}/tickets?performance_id=${performanceId}`);
        const data = await res.json();
        for (const ticket of (data.items || [])) {
          if (ticket.status === 'cancelled') continue;
          const el = seatMap.querySelector(`[data-label="${ticket.seat}"]`);
          if (el) el.classList.add('taken');
        }
      } catch {}
    }

    function openPerformance(perf, meta) {
      selectedPerf = { id: perf.id, name: perf.title, meta };

      const header = document.getElementById('show-detail-header');
      header.querySelector('h4').textContent = selectedPerf.name;
      header.querySelector('.meta').textContent = selectedPerf.meta;

      // Reset seat selection
      selectedSeats.clear();
      seatMap.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
      seatMap.querySelectorAll('.seat.taken').forEach(s => s.classList.remove('taken'));
      document.getElementById('booking-success').style.display = 'none';
      updateSummary();

      // Load taken seats from API
      loadTakenSeats(perf.id);

      // Swap views
      showList.style.display = 'none';
      showDetail.classList.add('active');
    }

    document.getElementById('back-link').addEventListener('click', () => {
      showDetail.classList.remove('active');
      showList.style.display = 'flex';
      selectedPerf = null;
      selectedSeats.clear();
      seatMap.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
      loadPerformances();
    });

    function updateSummary() {
      const sumSeats = document.getElementById('sum-seats');
      const sumBreakdown = document.getElementById('sum-breakdown');
      const sumTotal = document.getElementById('sum-total');
      const btn = document.getElementById('book-btn');
      const seatInfo = document.getElementById('seat-info');

      sumSeats.textContent = selectedSeats.size > 0 ? Array.from(selectedSeats).join(', ') : '—';

      if (selectedPerf && selectedSeats.size > 0) {
        const groups = {};
        for (const label of selectedSeats) {
          const tier = getTier(label);
          if (!groups[tier.type]) groups[tier.type] = { tier, count: 0, total: 0 };
          groups[tier.type].count++;
          groups[tier.type].total += Math.round(BASE_PRICE_PENCE * tier.mult);
        }

        let html = '';
        let grandTotal = 0;
        for (const g of Object.values(groups)) {
          html += `<div class="summary-row"><span>${g.count}× ${g.tier.label}</span><span>£${(g.total / 100).toFixed(2)}</span></div>`;
          grandTotal += g.total;
        }
        sumBreakdown.innerHTML = html;
        sumTotal.textContent = '£' + (grandTotal / 100).toFixed(2);
        seatInfo.innerHTML = '<strong>' + selectedSeats.size + '</strong> seat' + (selectedSeats.size !== 1 ? 's' : '') + ' selected';
        btn.textContent = 'Book ' + selectedSeats.size + ' seat' + (selectedSeats.size !== 1 ? 's' : '') + ' — £' + (grandTotal / 100).toFixed(2);
        btn.disabled = false;
      } else {
        sumBreakdown.innerHTML = '';
        sumTotal.textContent = '£0.00';
        seatInfo.textContent = 'Click seats to select';
        btn.textContent = 'Select seats';
        btn.disabled = true;
      }
    }

    // Book button
    document.getElementById('book-btn').addEventListener('click', async () => {
      const email = document.getElementById('booking-email').value;
      if (!email || !selectedPerf || selectedSeats.size === 0) return;

      const btn = document.getElementById('book-btn');
      btn.disabled = true;
      btn.textContent = 'Booking...';

      try {
        let customerId;
        const custRes = await fetch(`${API}/customers?email=${encodeURIComponent(email)}`);
        const custData = await custRes.json();

        if (custData.items?.length > 0) {
          customerId = custData.items[0].id;
        } else {
          const createRes = await fetch(`${API}/customers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: email.split('@')[0], email })
          });
          customerId = (await createRes.json()).id;
        }

        const seatLabels = Array.from(selectedSeats);
        let totalPence = 0;
        for (const s of seatLabels) totalPence += Math.round(BASE_PRICE_PENCE * getTier(s).mult);

        const tx = await (await fetch(`${API}/transactions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customer_id: customerId, amount_pence: totalPence, type: 'purchase', status: 'pending', client: 'web' })
        })).json();

        const ticketIds = [];
        for (const seat of seatLabels) {
          const tier = getTier(seat);
          const ticket = await (await fetch(`${API}/tickets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ performance_id: selectedPerf.id, customer_id: customerId, seat: seat, price_pence: Math.round(BASE_PRICE_PENCE * tier.mult), ticket_type: tier.type })
          })).json();
          ticketIds.push(ticket.id);
        }

        for (const ticketId of ticketIds) {
          await fetch(`${API}/transaction_tickets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transaction_id: tx.id, ticket_id: ticketId })
          });
        }

        await fetch(`${API}/transactions/${tx.id}/complete`, { method: 'POST' });

        const successEl = document.getElementById('booking-success');
        successEl.style.display = 'block';
        successEl.textContent = `Booked! ${seatLabels.length} seat${seatLabels.length !== 1 ? 's' : ''} for ${selectedPerf.name}`;
        btn.textContent = 'Booked!';

        seatLabels.forEach(label => {
          const seatEl = seatMap.querySelector(`[data-label="${label}"]`);
          if (seatEl) { seatEl.classList.remove('selected'); seatEl.classList.add('taken'); }
        });
        selectedSeats.clear();

        // Immediately refresh feed
        pollBookings();

        setTimeout(() => {
          successEl.style.display = 'none';
          // Return to show list
          showDetail.classList.remove('active');
          showList.style.display = 'flex';
          selectedPerf = null;
          updateSummary();
        }, 2000);

      } catch (err) {
        console.error(err);
        btn.textContent = 'Error — try again';
        btn.disabled = false;
      }
    });

    // --- Live bookings feed ---
    let knownBookings = new Set();
    let pollInterval = null;

    function startPolling() {
      if (pollInterval) return;
      pollBookings();
      pollInterval = setInterval(pollBookings, 2000);
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    async function pollBookings() {
      try {
        const res = await fetch(`${API}/transactions?sort=id&order=desc&limit=20`);
        const data = await res.json();
        const container = document.getElementById('feed-list');

        if (data.items.length === 0) {
          if (!container.querySelector('.booking-entry')) {
            container.innerHTML = '<div class="feed-empty">Waiting for bookings...</div>';
          }
          return;
        }

        // Check if anything changed
        const ids = data.items.map(b => b.id);
        const hasNew = ids.some(id => !knownBookings.has(id));
        const isEmpty = container.querySelector('.feed-empty') || container.children.length === 0;

        if (!hasNew && !isEmpty) return;

        // Preserve brain bookings
        const brainEntries = [...container.querySelectorAll('.booking-entry[data-brain]')];
        container.innerHTML = '';
        brainEntries.forEach(e => container.appendChild(e));

        for (const booking of data.items) {
          knownBookings.add(booking.id);

          let customerEmail = 'Unknown';
          if (booking.customer_id) {
            try {
              const cust = await (await fetch(`${API}/customers/${booking.customer_id}`)).json();
              customerEmail = cust.email || cust.name;
            } catch {}
          }

          const card = document.createElement('div');
          card.className = 'booking-entry';
          const client = booking.client || 'web';
          const clientClass = client === 'mcp' ? 'be-client mcp' : 'be-client';

          card.innerHTML = `
            <div class="be-header">
              <span class="be-amount">\u00a3${(booking.amount_pence / 100).toFixed(2)}</span>
              <span class="be-time">${formatTime(booking.created_at)}</span>
            </div>
            <div class="be-email">${customerEmail}</div>
            <span class="${clientClass}">${client}</span>
          `;
          container.appendChild(card);
        }
      } catch (err) {
        console.error('Poll error:', err);
      }
    }

    function formatTime(ts) {
      if (!ts) return 'just now';
      return new Date(ts).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    // Brain booking
    function injectBrainBooking() {
      const container = document.getElementById('feed-list');
      const empty = container.querySelector('.feed-empty');
      if (empty) empty.remove();

      const card = document.createElement('div');
      card.className = 'booking-entry';
      card.dataset.brain = 'true';
      const time = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

      card.innerHTML = `
        <div class="be-header">
          <span class="be-amount">\u00a325.00</span>
          <span class="be-time">${time}</span>
        </div>
        <div class="be-email">cerebral_cortex</div>
        <span class="be-client unknown">???</span>
      `;
      container.prepend(card);
    }

    // Initialize
    showStep(0);
  </script>
</body>
</html>
