<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duchy Opera - Live Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pathway+Extreme:wght@300;400;500;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0b0b;
      --fg: #e8e8e8;
      --accent: #fff;
      --accent-dim: rgba(255, 255, 255, 0.06);
      --muted: #777;
      --surface: #1e1e1e;
      --success: #e8e8e8;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* Left: Live Feed */
    .feed {
      border-right: 1px solid var(--surface);
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .feed h2 {
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feed h2::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--fg);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .bookings {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .booking-card {
      background: var(--surface);
      border-radius: 0.75rem;
      padding: 1.25rem;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .booking-card .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .booking-card .event {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .booking-card .time {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .booking-card .details {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .booking-card .client {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      border: 1px solid var(--muted);
      color: var(--muted);
    }

    .booking-card .client.mcp {
      border-color: var(--fg);
      color: var(--fg);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 3rem;
      font-style: italic;
    }

    /* Right: Booking Form */
    .form-side {
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .form-side h2 {
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .events {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .event-option {
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: 0.75rem;
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .event-option:hover {
      border-color: var(--muted);
    }

    .event-option.selected {
      border-color: var(--fg);
    }

    .event-option h4 {
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .event-option .meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .event-option .price {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--fg);
      margin-top: 0.5rem;
    }

    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input {
      background: var(--surface);
      border: 2px solid var(--surface);
      border-radius: 0.5rem;
      padding: 0.875rem 1rem;
      color: var(--fg);
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--fg);
    }

    input::placeholder {
      color: var(--muted);
    }

    button {
      background: var(--fg);
      border: none;
      border-radius: 0.5rem;
      padding: 1rem;
      color: var(--bg);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    .success-msg {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--fg);
      border-radius: 0.5rem;
      padding: 1rem;
      color: var(--fg);
      text-align: center;
      animation: slideIn 0.3s ease;
    }

    /* Logo */
    .corner-logo {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      text-decoration: none;
    }

    .corner-logo svg {
      height: 1.6em;
      width: auto;
      display: block;
    }

    .corner-logo .logo-text {
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      font-weight: 300;
      font-family: 'Pathway Extreme', sans-serif;
      text-transform: uppercase;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
    }

    .corner-logo .logo-stretch {
      display: block;
      letter-spacing: 0.12em;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
      .feed {
        border-right: none;
        border-bottom: 1px solid var(--surface);
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <a class="corner-logo" href="https://dutton.digital">
    <svg viewBox="-1 -1 23 23" fill="none" aria-hidden="true">
      <path d="M 1,0 L 8,0 C 15,0 15,14 8,14 L 1,14 A 1,1 0 0,1 0,13 L 0,1 A 1,1 0 0,1 1,0 Z" stroke="white" stroke-width="1.2" fill="none"/>
      <path d="M 7,7 L 14,7 C 21,7 21,21 14,21 L 7,21 A 1,1 0 0,1 6,20 L 6,8 A 1,1 0 0,1 7,7 Z" stroke="white" stroke-width="1.2" fill="none"/>
    </svg>
    <div class="logo-text"><span>Dutton</span><span class="logo-stretch">Digital</span></div>
  </a>

  <div class="container">
    <!-- Live Bookings Feed -->
    <div class="feed">
      <h2>Live Bookings</h2>
      <div class="bookings" id="bookings">
        <div class="empty">Waiting for bookings...</div>
      </div>
    </div>

    <!-- Booking Form -->
    <div class="form-side">
      <h2>Book Tickets</h2>

      <div class="events" id="events">
        <div class="event-option" data-id="1" data-name="La Traviata" data-price="25">
          <h4>La Traviata</h4>
          <div class="meta">Sat 22 Mar, 7:30pm · Minack Theatre</div>
          <div class="price">£25</div>
        </div>
        <div class="event-option" data-id="2" data-name="The Marriage of Figaro" data-price="30">
          <h4>The Marriage of Figaro</h4>
          <div class="meta">Sun 23 Mar, 3:00pm · Hall for Cornwall</div>
          <div class="price">£30</div>
        </div>
        <div class="event-option" data-id="3" data-name="Carmen" data-price="28">
          <h4>Carmen</h4>
          <div class="meta">Fri 28 Mar, 7:30pm · Truro Cathedral</div>
          <div class="price">£28</div>
        </div>
      </div>

      <div class="form-fields" id="form">
        <input type="email" id="email" placeholder="Email address" />
        <input type="number" id="qty" placeholder="Number of tickets" value="2" min="1" max="10" />
        <button id="book-btn" disabled>Select an event</button>
      </div>

      <div id="success" class="success-msg" style="display: none;">
        Booking confirmed!
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3085/api';
    let selectedEvent = null;
    let knownBookings = new Set();

    // Event selection
    document.querySelectorAll('.event-option').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.event-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedEvent = {
          id: el.dataset.id,
          name: el.dataset.name,
          price: el.dataset.price
        };
        document.getElementById('book-btn').disabled = false;
        document.getElementById('book-btn').textContent = `Book ${selectedEvent.name}`;
        document.getElementById('success').style.display = 'none';
      });
    });

    // Booking
    document.getElementById('book-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const qty = document.getElementById('qty').value;

      if (!email || !selectedEvent) return;

      const btn = document.getElementById('book-btn');
      btn.disabled = true;
      btn.textContent = 'Booking...';

      try {
        // Create customer if needed
        let customerId;
        const customersRes = await fetch(`${API}/customers?email=${encodeURIComponent(email)}`);
        const customers = await customersRes.json();

        if (customers.items.length > 0) {
          customerId = customers.items[0].id;
        } else {
          const createRes = await fetch(`${API}/customers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: email.split('@')[0], email })
          });
          const created = await createRes.json();
          customerId = created.id;
        }

        // Create transaction
        const txRes = await fetch(`${API}/transactions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: customerId,
            amount_pence: parseInt(selectedEvent.price) * parseInt(qty) * 100,
            type: 'purchase',
            status: 'completed',
            client: 'web'
          })
        });
        const tx = await txRes.json();

        // Show success
        document.getElementById('success').style.display = 'block';
        btn.textContent = 'Booked!';

        // Reset after delay
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = `Book ${selectedEvent.name}`;
          document.getElementById('success').style.display = 'none';
          document.getElementById('email').value = '';
        }, 2000);

      } catch (err) {
        console.error(err);
        btn.textContent = 'Error - try again';
        btn.disabled = false;
      }
    });

    // Poll for bookings
    async function pollBookings() {
      try {
        const res = await fetch(`${API}/transactions?sort=id&order=desc&limit=20`);
        const data = await res.json();

        const container = document.getElementById('bookings');

        if (data.items.length === 0) {
          container.innerHTML = '<div class="empty">Waiting for bookings...</div>';
          return;
        }

        // Check for new bookings
        const newBookings = data.items.filter(b => !knownBookings.has(b.id));

        if (newBookings.length > 0 || container.querySelector('.empty')) {
          // Rebuild list
          container.innerHTML = '';

          for (const booking of data.items) {
            knownBookings.add(booking.id);

            // Fetch customer details
            let customerEmail = 'Unknown';
            if (booking.customer_id) {
              try {
                const custRes = await fetch(`${API}/customers/${booking.customer_id}`);
                const cust = await custRes.json();
                customerEmail = cust.email || cust.name;
              } catch {}
            }

            const card = document.createElement('div');
            card.className = 'booking-card';

            const client = booking.client || 'web';
            const clientClass = client === 'mcp' ? 'client mcp' : 'client';

            card.innerHTML = `
              <div class="header">
                <span class="event">£${(booking.amount_pence / 100).toFixed(2)}</span>
                <span class="time">${formatTime(booking.created_at)}</span>
              </div>
              <div class="details">${customerEmail}</div>
              <span class="${clientClass}">${client}</span>
            `;

            container.appendChild(card);
          }
        }
      } catch (err) {
        console.error('Poll error:', err);
      }
    }

    function formatTime(ts) {
      if (!ts) return 'just now';
      const d = new Date(ts);
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    // Start polling
    pollBookings();
    setInterval(pollBookings, 2000);
  </script>
</body>
</html>
